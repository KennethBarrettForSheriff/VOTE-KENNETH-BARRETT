<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Add Election Day to Your Calendar</title>
<script>
function isAndroid() {
    return /Android/i.test(navigator.userAgent);
}
function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

window.onload = function() {
    if (isIOS()) {
        // iPhone users → download ICS file
        window.location.href = "vote-kenneth-barrett-sheriff.ics";
    } else if (isAndroid()) {
        // Android users → Google Calendar pre-fill link
        window.location.href = "https://calendar.google.com/calendar/r/eventedit?text=VOTE+KENNETH+BARRETT+FOR+SHERIFF&dates=20260505T080000/20260505T200000&details=Vote+for+Kenneth+Barrett+for+Sheriff+of+Rutherford+County,+TN&location=Rutherford+County,+TN";
    } else {
        alert("Please open this QR code on your phone to add to your calendar.");
    }
};
</script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding-top:80px;
    background:#f4f4f4;
}
button{
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}
</style>

</head>
<body>

<h2>Add Election Day to Your Calendar</h2>
<p>If your calendar doesn't open automatically, tap the button below:</p>

<button onclick="window.location.href='vote-kenneth-barrett-sheriff.ics'">
iPhone: Add to Calendar
</button>

<button onclick="window.location.href='https://calendar.google.com/calendar/r/eventedit?text=VOTE+KENNETH+BARRETT+FOR+SHERIFF&dates=20260505T080000/20260505T200000&details=Vote+for+Kenneth+Barrett+for+Sheriff+of+Rutherford+County,+TN&location=Rutherford+County,+TN'">
Android: Add to Calendar
</button>

</body>
</html>
